display_name: AI Code Inspection
short_description: 日常代码检查（命名、质量、架构分层、测试、文档、注释、提交准备）
default_prompt: 使用本 Skill 检查已修改的代码；先报告问题，只有开发者输入"继续"后才修复同一步问题；修复后执行验证，记录 runtime 状态，并保留 release/deploy 边界。本项目为 TypeScript monorepo，重点检查：路径别名使用、依赖方向分层（protocol → utils → core → agent-sdk → realtime → sdk → gateway → clients）、oxlint/tsc/dep-guard 验证通过。