# Path -> area/* mapping for actions/labeler@v5 (PR auto-labeling).
# Must stay aligned with the area/* labels in .github/labels.yml.
area/protocol:
  - changed-files:
      - any-glob-to-any-file:
          - packages/protocol/**
area/utils:
  - changed-files:
      - any-glob-to-any-file:
          - packages/utils/**
area/core:
  - changed-files:
      - any-glob-to-any-file:
          - packages/core/**
area/agent-sdk:
  - changed-files:
      - any-glob-to-any-file:
          - packages/agent-sdk/**
area/realtime:
  - changed-files:
      - any-glob-to-any-file:
          - packages/realtime/**
          - extensions/realtime-voice/**
          - extensions/realtime-aec/**
          - extensions/realtime-vad-silero/**
area/gateway:
  - changed-files:
      - any-glob-to-any-file:
          - src/gateway/**
area/sdk:
  - changed-files:
      - any-glob-to-any-file:
          - packages/sdk/**
area/cli:
  - changed-files:
      - any-glob-to-any-file:
          - src/cli/**
          - src/commands/**
          - src/runtime/**
          - src/bootstrap/**
          - src/*.ts
area/tui:
  - changed-files:
      - any-glob-to-any-file:
          - src/tui/**
area/ui:
  - changed-files:
      - any-glob-to-any-file:
          - ui/**
area/extensions:
  # 仅 LLM / MCP 等通用 adapter；realtime-* 三个目录已归到 area/realtime
  - changed-files:
      - any-glob-to-any-file:
          - extensions/llm/**
          - extensions/mcp/**
area/skills:
  - changed-files:
      - any-glob-to-any-file:
          - skills/**
area/build:
  - changed-files:
      - any-glob-to-any-file:
          - scripts/**
          - .github/**
          - package.json
          - pnpm-workspace.yaml
          - tsconfig.json
          - tsdown.config.ts
          - vitest.config.ts
          - .dependency-cruiser.cjs
          - knip.config.ts
area/docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - AGENTS.md
          - CONTRIBUTING.md
          - README.md
          - README_CN.md
