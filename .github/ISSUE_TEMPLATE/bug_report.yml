name: Bug report
description: Report a reproducible bug in step-realtime-cli
title: "[bug] "
labels: ["type/bug", "status/needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提 bug！请如实填写以下字段，缺失字段会显著拖慢分诊。
  - type: input
    id: version
    attributes:
      label: step-realtime-cli 版本
      description: 运行 `step --version`
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Node 版本 & OS
      description: 运行 `node --version`；OS 形如 macOS 14.5 / Windows 11 23H2 / Ubuntu 24.04
      placeholder: "Node 20.18.0 / macOS 14.5"
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 越精确越好，命令、输入、期望与实际请分行写
      placeholder: |
        1. `pnpm install`
        2. `pnpm step exec ...`
        3. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志 / 堆栈
      description: |
        请按场景贴对应日志（敏感信息务必脱敏）：
        - voice / vad / aec 子命令：`${cwd}/voice.log`
        - 默认 TUI（`step` 无子命令）：`~/.step-cli/logs/runtime.log`
        - 非交互 / 管道输出：`~/.step-cli/logs/dev.log`（stderr 镜像）
        如需更详细日志，运行命令前 export `LOG_LEVEL=debug`（或 `LOG_LEVEL=trace`）。
        例：`LOG_LEVEL=debug step voice ...`
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: 截图（可选）
      description: 终端截图 / UI 截图，方便快速复现现场
  - type: checkboxes
    id: confirm
    attributes:
      label: 自检
      options:
        - label: 我已搜索 existing issues，确认这不是重复问题
          required: true
        - label: 我已阅读 [CONTRIBUTING.md](https://github.com/stepfun-ai/Step-Realtime-CLI/blob/main/CONTRIBUTING.md)
          required: true
  - type: markdown
    attributes:
      value: |
        > Owner 会在分诊时补打 `priority/*` 与 `area/*` label，无需在此选择。
