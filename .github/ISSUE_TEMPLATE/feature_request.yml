name: Feature request
description: Propose a new capability for step-realtime-cli
title: "[feat] "
labels: ["type/feat", "status/needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 问题场景（这是为了解决什么问题？）
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望行为（你希望的方案）
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已经考虑过的替代方案
    validations:
      required: true
  - type: textarea
    id: refs
    attributes:
      label: 相关 issue / PR（可选）
      description: 如有相关讨论或前置工作，请贴链接
  - type: markdown
    attributes:
      value: |
        > Owner 会在分诊时补打 `priority/*` 与 `area/*` label，无需在此选择。
