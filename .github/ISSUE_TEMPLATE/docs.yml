name: Docs issue
description: 报告文档错误、缺失或不清楚
title: "[docs] "
labels: ["type/docs", "status/needs-triage"]
body:
  - type: input
    id: path
    attributes:
      label: 涉及文档路径
      description: 例如 `CONTRIBUTING.md` / `docs/TESTING.md` / `README.md` / `AGENTS.md`
      placeholder: "docs/TESTING.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 例如：描述与代码不符 / 链接失效 / 步骤缺失 / 表述歧义
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: 建议改法
      description: 给出你认为正确或更清晰的版本，便于 owner 直接采纳
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > Owner 会在分诊时补打 `priority/*` 与 `area/*` label，无需在此选择。
