name: Question
description: 提问或讨论非 bug 的疑惑
title: "[q] "
labels: ["type/question", "status/needs-triage"]
body:
  - type: textarea
    id: context
    attributes:
      label: 上下文（你正在尝试做什么？）
    validations:
      required: true
  - type: textarea
    id: question
    attributes:
      label: 具体问题
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: 已查阅的文档 / 已尝试的方法
      description: 例如：搜索过的 issue、读过的 README / docs 段落、试过的命令
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > Owner 会在分诊时补打 `priority/*` 与 `area/*` label，无需在此选择。
        > 注：若仓库已开启 GitHub Discussions，建议直接去 Discussions 提问。
