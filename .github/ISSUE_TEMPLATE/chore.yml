name: Chore / maintenance
description: 依赖升级 / 构建工具 / CI / 杂项维护任务
title: "[chore] "
labels: ["type/chore", "status/needs-triage"]
body:
  - type: textarea
    id: task
    attributes:
      label: 任务描述
      description: 一句话说明要做什么
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 动机
      description: 为什么要做（依赖升级 / 安全公告 / 构建优化 / CI 加固 等）
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > Owner 会在分诊时补打 `priority/*` 与 `area/*` label，无需在此选择。
