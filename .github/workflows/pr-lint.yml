# SECURITY: this workflow runs in the base repo context with write perms.
# DO NOT add actions/checkout for PR head; only read pull_request metadata.
# 任何后续扩展（哪怕"只是想跑个 lint"）若需要访问 PR head 代码，必须先迁回
# pull_request 事件 + 单独的 read-only job，不要在本 workflow 内 checkout fork。
name: PR lint
on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled]

jobs:
  # job id 为 link-check；GitHub branch protection 中以此名出现，
  # 详见 docs/BRANCH_PROTECTION.md「必需 status check 名称」。
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR body references an issue
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const labels = (pr.labels || []).map((l) => l.name);

            // Owner override
            if (labels.includes("skip-issue-link")) {
              core.info("skip-issue-link label set, skipping check.");
              return;
            }

            // 兼容 Closes / Fixes / Resolves / Refs + #N 或 <owner>/<repo>#N
            const re =
              /\b(closes|fixes|resolves|refs?)\s+(#\d+|[\w.-]+\/[\w.-]+#\d+)\b/i;
            if (!re.test(body)) {
              core.setFailed(
                "PR body must reference an issue using `Closes #N`, `Fixes #N`, " +
                  "or `Refs #N`. Owner may apply the `skip-issue-link` label to bypass.",
              );
            }
