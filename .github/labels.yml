# Declarative label manifest — single source of truth for repo labels.
# Synced to GitHub by .github/workflows/labels-sync.yml (EndBug/label-sync).
# 31 labels: priority×4, type×7, area×14, status×4, special×2.
# area/* paths must stay aligned with .github/labeler.yml.

# --- priority (owner-only, set during triage) ---
- name: priority/P0
  color: b60205
  description: Immediate fix; blocks main / security / production
- name: priority/P1
  color: d93f0b
  description: Must ship this iteration
- name: priority/P2
  color: fbca04
  description: Planned for next iteration
- name: priority/P3
  color: c2e0c6
  description: Nice to have, backlog

# --- type (auto-applied by issue templates / chosen in PR) ---
- name: type/bug
  color: d73a4a
  description: Something is broken
- name: type/feat
  color: a2eeef
  description: New feature or capability
- name: type/docs
  color: 0075ca
  description: Documentation
- name: type/chore
  color: cfd3d7
  description: Maintenance / build / CI
- name: type/refactor
  color: 5319e7
  description: Refactor with no behavior change
- name: type/test
  color: 0e8a16
  description: Tests only
- name: type/question
  color: d876e3
  description: Question / discussion

# --- area (issue: owner manual; PR: labeler by path) ---
- name: area/protocol
  color: bfd4f2
  description: packages/protocol
- name: area/utils
  color: bfd4f2
  description: packages/utils
- name: area/core
  color: bfd4f2
  description: packages/core
- name: area/agent-sdk
  color: bfd4f2
  description: packages/agent-sdk
- name: area/realtime
  color: bfd4f2
  description: packages/realtime + extensions/realtime-*
- name: area/gateway
  color: bfd4f2
  description: src/gateway
- name: area/sdk
  color: bfd4f2
  description: packages/sdk
- name: area/cli
  color: bfd4f2
  description: src/cli, src/commands, src/runtime, src/bootstrap, src/index.ts
- name: area/tui
  color: bfd4f2
  description: src/tui
- name: area/ui
  color: bfd4f2
  description: ui
- name: area/extensions
  color: bfd4f2
  description: extensions/llm, extensions/mcp (non realtime-*)
- name: area/skills
  color: bfd4f2
  description: skills
- name: area/build
  color: bfd4f2
  description: scripts, .github, build/config files
- name: area/docs
  color: bfd4f2
  description: docs, AGENTS.md, README(s), CONTRIBUTING.md

# --- status ---
- name: status/needs-triage
  color: ededed
  description: Waiting for owner triage
- name: status/in-progress
  color: fbca04
  description: Someone is actively working on it
- name: status/blocked
  color: b60205
  description: Blocked by something else
- name: status/ready-for-review
  color: 0e8a16
  description: PR is ready for review

# --- special ---
- name: skip-issue-link
  color: cccccc
  description: Allow PR without linked issue (owner override)
- name: good-first-issue
  color: 7057ff
  description: Friendly for new contributors
